name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Sync version from tag
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - run: npm ci
      - run: npm run build

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/nvision.js

      - name: Commit bundle to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cp dist/nvision.js /tmp/nvision.js
          git fetch origin main
          git checkout main
          git pull origin main
          mkdir -p dist
          cp /tmp/nvision.js dist/nvision.js
          npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version
          git add dist/nvision.js package.json
          git diff --staged --quiet || git commit -m "Build ${GITHUB_REF_NAME}"
          git push origin main
